<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorting Algorithm Visualizer</title>
    <style>
      :root {
        color-scheme: dark;
        --panel-bg: rgba(15, 18, 28, 0.82);
        --panel-border: rgba(120, 160, 220, 0.25);
        --text: #e6ecf5;
        --muted: #8a95a8;
        --accent: #6fb3ff;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #07090f;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #panel {
        position: fixed;
        top: 16px;
        left: 16px;
        min-width: 260px;
        padding: 14px 16px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        font-size: 13px;
        user-select: none;
      }
      #panel h1 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--accent);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 8px 0;
      }
      .row label {
        flex: 0 0 70px;
        color: var(--muted);
      }
      .row input[type="range"] {
        flex: 1;
        accent-color: var(--accent);
      }
      .row .value {
        flex: 0 0 36px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      select, button {
        background: rgba(255,255,255,0.06);
        color: var(--text);
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        padding: 6px 10px;
        font: inherit;
        cursor: pointer;
      }
      select { flex: 1; }
      button:hover { background: rgba(255,255,255,0.12); }
      button:active { background: rgba(255,255,255,0.18); }
      .buttons { display: flex; gap: 6px; margin-top: 10px; }
      .buttons button { flex: 1; }
      .mute {
        display: flex; align-items: center; gap: 8px;
        margin-top: 10px; color: var(--muted);
      }
      .mute input { accent-color: var(--accent); }
      #info {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid var(--panel-border);
        font-size: 11.5px;
      }
      .info-row {
        display: flex;
        align-items: baseline;
        gap: 6px;
        padding: 2px 0;
      }
      .info-k {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: 10px;
        min-width: 56px;
      }
      .info-v {
        color: var(--text);
        font-variant-numeric: tabular-nums;
        font-family: ui-monospace, monospace;
        font-size: 11.5px;
      }
      #summaryOverlay {
        position: fixed; inset: 0; z-index: 100;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        cursor: pointer;
      }
      #summaryOverlay[hidden] { display: none; }
      #summary {
        min-width: 320px;
        padding: 22px 26px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        cursor: default;
      }
      #summary h2 {
        margin: 0 0 14px;
        font-size: 15px;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.02em;
      }
      #summary .sum-grid {
        display: grid;
        grid-template-columns: 1fr auto;
        row-gap: 6px;
        column-gap: 16px;
        margin-bottom: 14px;
      }
      #summary .sum-k {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 10.5px;
      }
      #summary .sum-v {
        color: var(--text);
        font-variant-numeric: tabular-nums;
        font-size: 15px;
        font-weight: 600;
        text-align: right;
      }
      #summary .sum-foot {
        padding-top: 12px;
        border-top: 1px solid var(--panel-border);
        font-size: 12px;
        line-height: 1.7;
      }
      #summary .sum-foot .sum-k {
        margin-right: 6px;
      }
      #summary .sum-hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 10.5px;
        text-align: center;
      }
      #hint {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        color: var(--muted);
        font-size: 12px;
        pointer-events: none;
      }
      #hud {
        position: fixed;
        top: 16px;
        right: 16px;
        min-width: 180px;
        padding: 12px 14px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        font-size: 12px;
        user-select: none;
      }
      #hud .stat {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        padding: 3px 0;
      }
      #hud .stat .label {
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: 10.5px;
      }
      #hud .stat .num {
        color: var(--text);
        font-variant-numeric: tabular-nums;
        font-size: 14px;
        font-weight: 600;
      }
      #code {
        position: fixed;
        bottom: 16px;
        left: 16px;
        max-width: 380px;
        padding: 10px 12px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        font: 12.5px/1.5 ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        color: #c8d1e3;
        user-select: none;
      }
      #code h2 {
        margin: 0 0 6px;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #code ol {
        margin: 0;
        padding: 0;
        list-style: none;
        counter-reset: line;
      }
      #code li {
        counter-increment: line;
        white-space: pre;
        padding: 1px 6px 1px 28px;
        position: relative;
        border-radius: 4px;
        color: #8a95a8;
      }
      #code li::before {
        content: counter(line);
        position: absolute;
        left: 4px;
        top: 1px;
        width: 18px;
        text-align: right;
        color: #4a5468;
        font-size: 11px;
      }
      /* Active line: color must mirror bar state palette in src/bars.js
         default 0x4a89dc · compare 0xf6c244 · swap 0xe45757 · sorted 0x4ad295 */
      #code li.active { color: #eaf2ff; }
      #code li.active-default {
        background: rgba(74, 137, 220, 0.22);
        box-shadow: inset 2px 0 0 #4a89dc;
      }
      #code li.active-compare {
        background: rgba(246, 194, 68, 0.22);
        box-shadow: inset 2px 0 0 #f6c244;
      }
      #code li.active-swap {
        background: rgba(228, 87, 87, 0.24);
        box-shadow: inset 2px 0 0 #e45757;
      }
      #code li.active-sorted {
        background: rgba(74, 210, 149, 0.22);
        box-shadow: inset 2px 0 0 #4ad295;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="panel">
      <h1>Sorting Visualizer</h1>
      <div class="row">
        <label for="algo">Algorithm</label>
        <select id="algo"></select>
      </div>
      <div class="row">
        <label for="preset">Input</label>
        <select id="preset">
          <option value="random">Random</option>
          <option value="sorted">Sorted</option>
          <option value="reversed">Reversed</option>
          <option value="nearly">Nearly sorted</option>
          <option value="few-unique">Few unique</option>
        </select>
      </div>
      <div class="row">
        <label for="size">Size</label>
        <input id="size" type="range" min="16" max="200" value="64" />
        <span class="value" id="sizeVal">64</span>
      </div>
      <div class="row">
        <label for="speed">Speed</label>
        <input id="speed" type="range" min="1" max="50" value="4" />
        <span class="value" id="speedVal">4</span>
      </div>
      <div class="buttons">
        <button id="shuffle">New Array</button>
        <button id="play">Play</button>
        <button id="step">Step</button>
        <button id="reset">Reset</button>
      </div>
      <label class="mute">
        <input type="checkbox" id="mute" />
        Mute
      </label>
      <div id="info">
        <div class="info-row"><span class="info-k">Best</span><span class="info-v" id="infoBest">—</span></div>
        <div class="info-row"><span class="info-k">Average</span><span class="info-v" id="infoAvg">—</span></div>
        <div class="info-row"><span class="info-k">Worst</span><span class="info-v" id="infoWorst">—</span></div>
        <div class="info-row"><span class="info-k">Space</span><span class="info-v" id="infoSpace">—</span></div>
        <div class="info-row">
          <span class="info-k">Stable</span><span class="info-v" id="infoStable">—</span>
          <span class="info-k" style="margin-left:10px">In-place</span><span class="info-v" id="infoInPlace">—</span>
        </div>
      </div>
    </div>
    <div id="summaryOverlay" hidden>
      <div id="summary">
        <h2 id="sumTitle">Sort complete</h2>
        <div class="sum-grid">
          <div class="sum-k">Comparisons</div><div class="sum-v" id="sumComps">0</div>
          <div class="sum-k">Writes</div><div class="sum-v" id="sumWrites">0</div>
          <div class="sum-k">Time</div><div class="sum-v" id="sumTime">0.0s</div>
        </div>
        <div class="sum-foot">
          <div><span class="sum-k">Worst case</span> <span id="sumWorst">—</span></div>
          <div><span class="sum-k">This run</span> <span id="sumRatio">—</span> of worst</div>
        </div>
        <div class="sum-hint">click to dismiss</div>
      </div>
    </div>
    <div id="hud">
      <div class="stat"><span class="label">Comparisons</span><span class="num" id="compCount">0</span></div>
      <div class="stat"><span class="label">Writes</span><span class="num" id="writeCount">0</span></div>
    </div>
    <div id="code">
      <h2>Pseudocode</h2>
      <ol id="codeList"></ol>
    </div>
    <div id="hint">click play to start — sound begins on first interaction</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
